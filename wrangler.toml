name = "dinner-six-backend"
main = "src/worker.js"
compatibility_date = "2026-06-28"

# Production secrets required:
# - JWT_SECRET: token signing secret
# - RESEND_API_KEY: API key used to send sign-in codes by email
# Set with:
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put RESEND_API_KEY
#
# For durable production storage, create and bind KV namespaces below.
# Without them, Workers may lose in-memory data on restart.
# [[kv_namespaces]]
# binding = "AUTH_CODES"
# id = "<auth-codes-kv-namespace-id>"
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "<sessions-kv-namespace-id>"
# [[kv_namespaces]]
# binding = "REGISTRATIONS"
# id = "<registrations-kv-namespace-id>"

[vars]
FRONTEND_ORIGIN = "*"
RETURN_DEV_CODES = "false"
EMAIL_PROVIDER = "resend"
EMAIL_FROM = "DinnerSix <onboarding@resend.dev>"
MATCH_WAIT_DAYS_MIN = "2"
MATCH_WAIT_DAYS_MAX = "4"
