name = "dinner-six-backend"
main = "src/worker.js"
compatibility_date = "2026-06-28"

# Required Cloudflare secrets:
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put GOOGLE_CLIENT_ID
#   npx wrangler secret put GOOGLE_CLIENT_SECRET
#   npx wrangler secret put TURNSTILE_SECRET_KEY
#   npx wrangler secret put ADMIN_API_KEY
#     (POST /admin/reset with header "X-Admin-Key: <value>" wipes all
#      registrations/matches/ratings/sessions/users back to empty state.
#      The route 404s until this secret is set.)
#
# Required Google OAuth redirect URI:
#   https://dinner-six-backend.shijanhoo.workers.dev/auth/google/callback
#
# Required D1 setup:
#   npx wrangler d1 create dinner-six-db
#   Replace database_id below with the created database_id.
#   npx wrangler d1 migrations apply dinner-six-db --remote

[[d1_databases]]
binding = "DB"
database_name = "dinner-six-db"
database_id = "7598b60f-3750-4877-b746-4ed149dc9945"

[vars]
FRONTEND_URL = "https://dinner-six.shijanhoo.workers.dev"
FRONTEND_ORIGIN = "*"
ALLOWED_RETURN_ORIGINS = "https://dinner-six.shijanhoo.workers.dev"
PUBLIC_BACKEND_URL = "https://dinner-six-backend.shijanhoo.workers.dev"
MATCH_WAIT_DAYS_MIN = "2"
MATCH_WAIT_DAYS_MAX = "4"
RATING_WINDOW_HOURS = "3"
REJECT_COOLDOWN_HOURS = "6"
